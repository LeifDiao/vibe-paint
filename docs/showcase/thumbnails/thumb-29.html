<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vibe-paint · Grunge Underground Thumbnail</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Roboto Mono', monospace;
      background: #F2E8D5;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 1px,
        rgba(0, 0, 0, 0.03) 1px,
        rgba(0, 0, 0, 0.03) 2px
      );
      color: #1A1A1A;
    }

    .container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .hero {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      font-weight: 400;
      margin: 0 0 6px 0;
      color: #C62828;
      letter-spacing: 2px;
      text-transform: uppercase;
      transform: skewX(-5deg);
    }

    .hero p {
      font-size: 14px;
      margin: 0;
      color: #4A4A4A;
      letter-spacing: 0.5px;
    }

    .grid {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      overflow: hidden;
    }

    .cell {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 2px solid #333333;
      border-bottom: 2px solid #333333;
      background: #F9F6F1;
      position: relative;
    }

    .cell:nth-child(3n) { border-right: none; }
    .cell:nth-child(n+7) { border-bottom: none; }

    /* Component styling */
    .stat { width: 100%; }
    .stat-label { font-size: 11px; color: #7A7A7A; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-row { display: flex; align-items: center; gap: 4px; }
    .stat-value { font-size: 16px; font-weight: 700; color: #C62828; }
    .stat-change { font-size: 12px; color: #3D5A2C; }

    .chart { display: flex; align-items: flex-end; justify-content: center; gap: 3px; width: 100%; height: 60px; }
    .bar { background: #C62828; width: 6px; border-radius: 0; transform: scaleY(1) skewY(-2deg); }

    .btn-pair { display: flex; gap: 6px; }
    .btn-p, .btn-o { padding: 6px 10px; font-size: 12px; border: 2px solid #333333; border-radius: 0; cursor: pointer; font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Roboto Mono', monospace; }
    .btn-p { background: #C62828; color: white; }
    .btn-o { background: #F2E8D5; color: #1A1A1A; }
    .btn-p:hover { transform: skew(-2deg); }

    .input-g { width: 85%; }
    .input-l { display: block; font-size: 11px; color: #4A4A4A; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
    .input-f { width: 100%; padding: 5px 8px; border: 2px solid #333333; border-radius: 0; font-size: 12px; box-sizing: border-box; background: white; }

    .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
    .badge { padding: 3px 8px; font-size: 10px; border-radius: 12px; font-weight: 400; border: 1px solid #333333; letter-spacing: 0.3px; text-transform: uppercase; }
    .b-1 { background: #E8F5E9; color: #3D5A2C; }
    .b-2 { background: #E3F2FD; color: #2C5282; }
    .b-3 { background: #FFF8E1; color: #B8860B; }

    .prog { width: 85%; }
    .prog-l { font-size: 11px; color: #4A4A4A; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .prog-track { background: #D4D4D4; border-radius: 0; height: 4px; overflow: hidden; border: 1px solid #333333; }
    .prog-fill { background: #C62828; height: 100%; width: 65%; }

    .toggle { display: flex; align-items: center; gap: 6px; }
    .toggle-t { width: 32px; height: 18px; background: #D4D4D4; border-radius: 0; position: relative; border: 2px solid #333333; }
    .toggle-k { position: absolute; top: 0px; left: 0px; width: 14px; height: 14px; background: #C62828; border-radius: 0; transition: left 0.3s; }
    .toggle-l { font-size: 12px; color: #1A1A1A; text-transform: uppercase; letter-spacing: 0.3px; }

    .avatars { display: flex; gap: 3px; }
    .av { width: 24px; height: 24px; border-radius: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; border: 2px solid #333333; }
    .av-1 { background: #C62828; }
    .av-2 { background: #4A4A4A; }
    .av-3 { background: #2C5282; }
    .av-4 { background: #B8860B; }

    .tbl { font-size: 11px; width: 100%; border-collapse: collapse; }
    .tbl th, .tbl td { padding: 4px; text-align: left; border: 1px solid #333333; }
    .tbl th { font-weight: 700; color: #C62828; text-transform: uppercase; letter-spacing: 0.3px; }
    .tbl td { color: #1A1A1A; }
    .tbl .r { text-align: right; }
  </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Grunge</h1>
            <p>Raw underground edge</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
