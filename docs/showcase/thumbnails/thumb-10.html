<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento Grid Thumbnail</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(123, 58, 237, 0.15) 0%, rgba(79, 70, 229, 0.08) 25%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }

    .container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .hero {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
      margin: 0 0 6px 0;
    }

    .hero p {
      font-size: 14px;
      margin: 0;
      color: #a0a0a0;
    }

    .grid {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      overflow: hidden;
    }

    .cell {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .cell:nth-child(3n) { border-right: none; }
    .cell:nth-child(n+7) { border-bottom: none; }

    .stat {
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 12px;
      width: 100%;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #696969;
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .stat-change {
      font-size: 12px;
      color: #10b981;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      width: 100%;
      height: 60%;
    }

    .bar {
      width: 6px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 2px;
    }

    .btn-pair {
      display: flex;
      gap: 8px;
    }

    .btn-p, .btn-o {
      padding: 8px 14px;
      border: 1px solid transparent;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms ease-in-out;
    }

    .btn-p {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border-color: transparent;
      box-shadow: none;
    }

    .btn-p:hover {
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
      transform: translateY(-2px);
    }

    .btn-o {
      background: #1a1a1a;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.06);
    }

    .btn-o:hover {
      background: #131313;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .input-g {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .input-l {
      font-size: 11px;
      color: #696969;
      margin-bottom: 4px;
    }

    .input-f {
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      color: white;
      font-size: 12px;
      font-family: inherit;
    }

    .input-f::placeholder {
      color: #696969;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .b-1 {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .b-2 {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }

    .b-3 {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }

    .prog {
      width: 100%;
    }

    .prog-l {
      font-size: 11px;
      color: #696969;
      margin-bottom: 4px;
    }

    .prog-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      width: 65%;
      background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-t {
      width: 32px;
      height: 18px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 9px;
      padding: 2px;
      display: flex;
      align-items: center;
    }

    .toggle-k {
      width: 14px;
      height: 14px;
      background: #696969;
      border-radius: 6px;
      transition: all 200ms;
      margin-left: 12px;
    }

    .toggle-l {
      font-size: 12px;
      color: #a0a0a0;
    }

    .avatars {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .tbl th, .tbl td {
      padding: 4px 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      text-align: left;
    }

    .tbl th {
      color: #696969;
      font-weight: 600;
    }

    .tbl td {
      color: #a0a0a0;
    }

    .r {
      text-align: right;
    }
  </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Bento Grid</h1>
            <p>Japanese-inspired layout</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
