<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claymorphism Thumbnail</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF0FF;
      color: #6C5CE7;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      right: -5%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle at 30% 50%, #E8D5F2 0%, #F0EDFF 40%, transparent 70%);
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      filter: blur(40px);
      z-index: -2;
      animation: float 15s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -15%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle at 40% 50%, #FDD5E9 0%, #FFE8F0 40%, transparent 70%);
      border-radius: 30% 70% 40% 60% / 50% 40% 60% 50%;
      filter: blur(45px);
      z-index: -2;
      animation: float-reverse 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(30px, -30px) rotate(180deg); }
    }

    @keyframes float-reverse {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-30px, 30px) rotate(180deg); }
    }

    .container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .hero {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
      margin: 0 0 6px 0;
    }

    .hero p {
      font-size: 14px;
      margin: 0;
      color: #9B88D9;
    }

    .grid {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      overflow: hidden;
    }

    .cell {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #E8DFF8;
      border-bottom: 1px solid #E8DFF8;
    }

    .cell:nth-child(3n) { border-right: none; }
    .cell:nth-child(n+7) { border-bottom: none; }

    .stat {
      background: #ffffff;
      box-shadow: 0 10px 40px rgba(108, 92, 231, 0.15), inset 0 -3px 4px rgba(108, 92, 231, 0.1);
      border: none;
      border-radius: 16px;
      padding: 12px;
      width: 100%;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #C5B9E8;
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #6C5CE7;
    }

    .stat-change {
      font-size: 12px;
      color: #00CEC9;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      width: 100%;
      height: 60%;
    }

    .bar {
      width: 6px;
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
      border-radius: 3px;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.2), inset 0 -2px 3px rgba(108, 92, 231, 0.1);
    }

    .btn-pair {
      display: flex;
      gap: 8px;
    }

    .btn-p, .btn-o {
      padding: 8px 14px;
      border: none;
      border-radius: 18px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms ease-in-out;
    }

    .btn-p {
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
      color: white;
      box-shadow: 0 12px 40px rgba(108, 92, 231, 0.15), inset 0 -4px 6px rgba(108, 92, 231, 0.1);
    }

    .btn-p:hover {
      box-shadow: 0 16px 50px rgba(108, 92, 231, 0.25), inset 0 -4px 6px rgba(108, 92, 231, 0.12);
      transform: scale(1.02);
    }

    .btn-o {
      background: white;
      color: #6C5CE7;
      box-shadow: 0 12px 40px rgba(108, 92, 231, 0.15), inset 0 -4px 6px rgba(108, 92, 231, 0.08);
    }

    .btn-o:hover {
      box-shadow: 0 16px 50px rgba(108, 92, 231, 0.2), inset 0 -4px 6px rgba(108, 92, 231, 0.1);
      transform: scale(1.02);
    }

    .input-g {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .input-l {
      font-size: 11px;
      color: #9B88D9;
      margin-bottom: 4px;
    }

    .input-f {
      padding: 6px 8px;
      background: white;
      border: none;
      border-radius: 12px;
      color: #6C5CE7;
      font-size: 12px;
      font-family: inherit;
      box-shadow: 0 8px 24px rgba(108, 92, 231, 0.12), inset 0 -2px 4px rgba(108, 92, 231, 0.06);
    }

    .input-f::placeholder {
      color: #C5B9E8;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      border: none;
      box-shadow: 0 8px 24px rgba(108, 92, 231, 0.15), inset 0 -2px 4px rgba(108, 92, 231, 0.08);
    }

    .b-1 {
      background: white;
      color: #6C5CE7;
    }

    .b-2 {
      background: #E0F9F7;
      color: #00997A;
    }

    .b-3 {
      background: #FFFAEA;
      color: #D97706;
    }

    .prog {
      width: 100%;
    }

    .prog-l {
      font-size: 11px;
      color: #9B88D9;
      margin-bottom: 4px;
    }

    .prog-track {
      width: 100%;
      height: 6px;
      background: white;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.1), inset 0 -2px 3px rgba(108, 92, 231, 0.06);
    }

    .prog-fill {
      height: 100%;
      width: 65%;
      background: linear-gradient(90deg, #6C5CE7 0%, #A29BFE 100%);
      box-shadow: inset 0 -1px 2px rgba(108, 92, 231, 0.1);
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-t {
      width: 32px;
      height: 18px;
      background: white;
      border-radius: 9px;
      padding: 2px;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.1), inset 0 -2px 3px rgba(108, 92, 231, 0.06);
    }

    .toggle-k {
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
      border-radius: 6px;
      transition: all 200ms;
      margin-left: 12px;
      box-shadow: 0 4px 8px rgba(108, 92, 231, 0.2), inset 0 -1px 2px rgba(108, 92, 231, 0.1);
    }

    .toggle-l {
      font-size: 12px;
      color: #9B88D9;
    }

    .avatars {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      background: white;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.15), inset 0 -2px 3px rgba(108, 92, 231, 0.1);
    }

    .tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .tbl th, .tbl td {
      padding: 4px 6px;
      border-bottom: 1px solid #E8DFF8;
      text-align: left;
    }

    .tbl th {
      color: #9B88D9;
      font-weight: 600;
    }

    .tbl td {
      color: #6C5CE7;
    }

    .r {
      text-align: right;
    }
  </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Claymorphism</h1>
            <p>3D clay-like surfaces</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
