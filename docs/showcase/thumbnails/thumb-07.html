<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphism Thumbnail</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e0e5ec;
      color: #44476A;
    }

    .container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .hero {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
      margin: 0 0 6px 0;
    }

    .hero p {
      font-size: 14px;
      margin: 0;
      color: #72788C;
    }

    .grid {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      overflow: hidden;
    }

    .cell {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #cad5e2;
      border-bottom: 1px solid #cad5e2;
    }

    .cell:nth-child(3n) { border-right: none; }
    .cell:nth-child(n+7) { border-bottom: none; }

    .stat {
      background: #e0e5ec;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      border: none;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #9CA3AF;
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #44476A;
    }

    .stat-change {
      font-size: 12px;
      color: #10B981;
    }

    .chart {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      width: 100%;
      height: 60%;
    }

    .bar {
      width: 6px;
      background: #6c63ff;
      border-radius: 2px;
      box-shadow: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
    }

    .btn-pair {
      display: flex;
      gap: 8px;
    }

    .btn-p, .btn-o {
      padding: 8px 14px;
      border: none;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 150ms ease-in-out;
    }

    .btn-p {
      background: #6c63ff;
      color: white;
      box-shadow: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
    }

    .btn-p:hover {
      box-shadow: 8px 8px 16px #a3b1c6, -8px -8px 16px #ffffff;
    }

    .btn-o {
      background: #e0e5ec;
      color: #44476A;
      box-shadow: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
    }

    .btn-o:hover {
      box-shadow: 8px 8px 16px #a3b1c6, -8px -8px 16px #ffffff;
    }

    .input-g {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .input-l {
      font-size: 11px;
      color: #72788C;
      margin-bottom: 4px;
    }

    .input-f {
      padding: 6px 8px;
      background: #e0e5ec;
      border: none;
      border-radius: 8px;
      color: #44476A;
      font-size: 12px;
      font-family: inherit;
      box-shadow: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
    }

    .input-f::placeholder {
      color: #9CA3AF;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      box-shadow: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
    }

    .b-1 {
      background: #e0f9f7;
      color: #00997A;
    }

    .b-2 {
      background: #e0f4ff;
      color: #0284c7;
    }

    .b-3 {
      background: #fff9e6;
      color: #d97706;
    }

    .prog {
      width: 100%;
    }

    .prog-l {
      font-size: 11px;
      color: #72788C;
      margin-bottom: 4px;
    }

    .prog-track {
      width: 100%;
      height: 4px;
      background: #e0e5ec;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: inset 2px 2px 4px #a3b1c6, inset -2px -2px 4px #ffffff;
    }

    .prog-fill {
      height: 100%;
      width: 65%;
      background: #6c63ff;
      box-shadow: 0 2px 4px rgba(108, 99, 255, 0.3);
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-t {
      width: 32px;
      height: 18px;
      background: #e0e5ec;
      border-radius: 9px;
      padding: 2px;
      display: flex;
      align-items: center;
      box-shadow: inset 2px 2px 4px #a3b1c6, inset -2px -2px 4px #ffffff;
    }

    .toggle-k {
      width: 14px;
      height: 14px;
      background: #e0e5ec;
      border-radius: 6px;
      transition: all 200ms;
      margin-left: 12px;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .toggle-l {
      font-size: 12px;
      color: #72788C;
    }

    .avatars {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      background: #e0e5ec;
      box-shadow: 4px 4px 8px #a3b1c6, -4px -4px 8px #ffffff;
    }

    .tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .tbl th, .tbl td {
      padding: 4px 6px;
      border-bottom: 1px solid #cad5e2;
      text-align: left;
    }

    .tbl th {
      color: #72788C;
      font-weight: 600;
    }

    .tbl td {
      color: #44476A;
    }

    .r {
      text-align: right;
    }
  </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Neumorphism</h1>
            <p>Soft extruded surfaces</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
