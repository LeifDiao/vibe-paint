<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vibe-paint · Organic Earth Thumbnail</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF5EF;
      color: #3C3C3C;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(107, 142, 35, 0.08) 0%, transparent 15%),
        radial-gradient(circle at 85% 30%, rgba(139, 115, 85, 0.07) 0%, transparent 18%),
        radial-gradient(ellipse at 40% 60%, rgba(91, 124, 91, 0.06) 0%, transparent 20%),
        radial-gradient(circle at 70% 75%, rgba(139, 115, 85, 0.05) 0%, transparent 16%);
      background-attachment: fixed;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139, 115, 85, 0.02) 2px, rgba(139, 115, 85, 0.02) 3px),
        repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(139, 115, 85, 0.01) 1px, rgba(139, 115, 85, 0.01) 2px);
      background-attachment: fixed;
    }

    .container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .hero {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-family: 'Lora', serif;
      font-size: 56px;
      font-weight: 700;
      margin: 0 0 6px 0;
      color: #8B7355;
    }

    .hero p {
      font-size: 14px;
      margin: 0;
      color: #6B6B6B;
    }

    .grid {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      overflow: hidden;
    }

    .cell {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #D4C5B2;
      border-bottom: 1px solid #D4C5B2;
      background: #FBF8F3;
    }

    .cell:nth-child(3n) { border-right: none; }
    .cell:nth-child(n+7) { border-bottom: none; }

    /* Component styling */
    .stat { width: 100%; }
    .stat-label { font-size: 11px; color: #999999; margin-bottom: 4px; }
    .stat-row { display: flex; align-items: center; gap: 4px; }
    .stat-value { font-size: 16px; font-weight: 600; color: #8B7355; }
    .stat-change { font-size: 12px; color: #2D5016; }

    .chart { display: flex; align-items: flex-end; justify-content: center; gap: 3px; width: 100%; height: 60px; }
    .bar { background: linear-gradient(to top, #8B7355, #C8A882); width: 6px; border-radius: 2px; }

    .btn-pair { display: flex; gap: 6px; }
    .btn-p, .btn-o { padding: 6px 10px; font-size: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
    .btn-p { background: #8B7355; color: white; }
    .btn-o { background: transparent; color: #3C3C3C; border: 1px solid #D4C5B2; }

    .input-g { width: 85%; }
    .input-l { display: block; font-size: 11px; color: #6B6B6B; margin-bottom: 3px; }
    .input-f { width: 100%; padding: 5px 8px; border: 1px solid #D4C5B2; border-radius: 6px; font-size: 12px; box-sizing: border-box; }

    .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
    .badge { padding: 3px 8px; font-size: 10px; border-radius: 12px; font-weight: 600; }
    .b-1 { background: #E6EED6; color: #6B8E23; }
    .b-2 { background: #EBF0E8; color: #2D5016; }
    .b-3 { background: #F5EAD1; color: #A67C3A; }

    .prog { width: 85%; }
    .prog-l { font-size: 11px; color: #6B6B6B; margin-bottom: 4px; }
    .prog-track { background: #E8DFD0; border-radius: 4px; height: 4px; overflow: hidden; }
    .prog-fill { background: #8B7355; height: 100%; width: 65%; }

    .toggle { display: flex; align-items: center; gap: 6px; }
    .toggle-t { width: 32px; height: 18px; background: #D4C5B2; border-radius: 9px; position: relative; }
    .toggle-k { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 6px; transition: left 0.3s; }
    .toggle-l { font-size: 12px; color: #3C3C3C; }

    .avatars { display: flex; gap: 3px; }
    .av { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: white; }
    .av-1 { background: #8B7355; }
    .av-2 { background: #6B8E23; }
    .av-3 { background: #5B7C5B; }
    .av-4 { background: #C89858; }

    .tbl { font-size: 11px; width: 100%; border-collapse: collapse; }
    .tbl th, .tbl td { padding: 4px; text-align: left; border-bottom: 1px solid #E8DFD0; }
    .tbl th { font-weight: 600; color: #8B7355; }
    .tbl td { color: #3C3C3C; }
    .tbl .r { text-align: right; }
  </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Organic Earth</h1>
            <p>Natural botanical warmth</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
