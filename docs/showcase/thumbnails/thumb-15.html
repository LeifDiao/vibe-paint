<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isometric Playful - Thumbnail</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f6fb 0%, #fafbff 100%);
      color: #0f172a;
    }

    .container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      background:
        radial-gradient(circle 200px at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 70%),
        radial-gradient(circle 150px at 80% 80%, rgba(236, 72, 153, 0.07) 0%, transparent 70%),
        radial-gradient(circle 180px at 70% 30%, rgba(16, 185, 129, 0.06) 0%, transparent 70%);
    }

    .hero {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 246, 251, 0.95) 100%);
      border-bottom: 3px solid #e5e7eb;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.1), 4px 4px 0px rgba(236, 72, 153, 0.08);
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
      margin: 0 0 6px 0;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 14px;
      margin: 0;
      color: #475569;
      font-weight: 600;
    }

    .grid {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      overflow: hidden;
      background: rgba(250, 251, 255, 0.5);
    }

    .cell {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.7);
      position: relative;
      transition: all 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .cell:nth-child(3n) {
      border-right: none;
    }

    .cell:nth-child(n+7) {
      border-bottom: none;
    }

    /* Stat */
    .stat {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #0f172a;
    }

    .stat-label {
      font-size: 10px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .stat-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 700;
      color: #6366f1;
    }

    .stat-change {
      font-size: 11px;
      color: #10b981;
      font-weight: 600;
    }

    /* Chart */
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 40px;
      width: 100%;
    }

    .bar {
      flex: 1;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      border: 1px solid #e5e7eb;
      border-radius: 3px;
      box-shadow: 2px 2px 0px rgba(236, 72, 153, 0.15);
    }

    /* Buttons */
    .btn-pair {
      display: flex;
      gap: 6px;
    }

    button {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid #e5e7eb;
      background: linear-gradient(135deg, rgba(230, 230, 230, 0.9), rgba(240, 241, 245, 0.9));
      color: #0f172a;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-family: inherit;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), 2px 2px 0px rgba(236, 72, 153, 0.1);
      transition: all 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-p {
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3), 3px 3px 0px rgba(236, 72, 153, 0.15);
    }

    .btn-o {
      background: linear-gradient(135deg, rgba(230, 230, 230, 0.9), rgba(240, 241, 245, 0.9));
      color: #0f172a;
    }

    /* Input */
    .input-g {
      width: 100%;
      padding: 0 4px;
    }

    .input-l {
      display: block;
      font-size: 9px;
      font-weight: 700;
      margin-bottom: 3px;
      color: #0f172a;
    }

    .input-f {
      width: 100%;
      padding: 4px 6px;
      font-size: 10px;
      border: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.8);
      color: #0f172a;
      font-family: inherit;
      box-sizing: border-box;
      border-radius: 4px;
    }

    /* Badges */
    .badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      padding: 3px 8px;
      font-size: 9px;
      font-weight: 700;
      border: 1px solid #e5e7eb;
      background: #e0e7ff;
      color: #4f46e5;
      border-radius: 16px;
      box-shadow: 0 2px 4px rgba(99, 102, 241, 0.15), 2px 2px 0px rgba(99, 102, 241, 0.1);
    }

    .b-1 {
      background: #dcfce7;
      color: #166534;
      border-color: #10b981;
    }

    .b-2 {
      background: #e0e7ff;
      color: #4f46e5;
      border-color: #6366f1;
    }

    .b-3 {
      background: #fef3c7;
      color: #92400e;
      border-color: #f59e0b;
    }

    /* Progress */
    .prog {
      width: 100%;
      padding: 0 4px;
    }

    .prog-l {
      font-size: 9px;
      font-weight: 700;
      margin-bottom: 3px;
      color: #0f172a;
    }

    .prog-track {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border: 1px solid #e5e7eb;
      border-radius: 3px;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      width: 65%;
      border-radius: 3px;
    }

    /* Toggle */
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle-t {
      width: 28px;
      height: 14px;
      background: #e5e7eb;
      border: 1px solid #d1d5db;
      position: relative;
      border-radius: 7px;
    }

    .toggle-k {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      position: absolute;
      top: 2px;
      left: 2px;
      border-radius: 50%;
    }

    .toggle-l {
      font-size: 10px;
      font-weight: 700;
      color: #0f172a;
    }

    /* Avatars */
    .avatars {
      display: flex;
      gap: 4px;
    }

    .av {
      width: 20px;
      height: 20px;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      background: linear-gradient(135deg, #e0e7ff 0%, #fce7f3 100%);
      color: #4f46e5;
      border-radius: 6px;
    }

    .av-2 {
      background: linear-gradient(135deg, #fce7f3 0%, #fef3c7 100%);
      color: #ec4899;
    }

    .av-3 {
      background: linear-gradient(135deg, #fef3c7 0%, #dcfce7 100%);
      color: #92400e;
    }

    .av-4 {
      background: linear-gradient(135deg, #dcfce7 0%, #e0e7ff 100%);
      color: #166534;
    }

    /* Table */
    .tbl {
      width: 100%;
      font-size: 10px;
      border-collapse: collapse;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }

    .tbl th, .tbl td {
      padding: 4px 6px;
      border: 1px solid #e5e7eb;
      text-align: left;
      color: #0f172a;
    }

    .tbl th {
      font-weight: 700;
      background: linear-gradient(135deg, #f0f4ff 0%, #f5f3ff 100%);
      font-size: 9px;
    }

    .tbl td.r {
      text-align: right;
    }
  </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Isometric Playful</h1>
            <p>3D playful perspective</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
