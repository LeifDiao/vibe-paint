<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Data-Dense</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f1019;
            color: #e2e8f0;
        }

        .container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* ── Hero: top 50% ── */
        .hero {
            flex: 0 0 50%;
            background:
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px),
                repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(124,58,237,0.08) 19px, rgba(124,58,237,0.08) 20px),
                linear-gradient(135deg, #0f1019, #13141f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #7C3AED;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            margin: 0 0 6px 0;
            letter-spacing: -1px;
            color: #7C3AED;
        }

        .hero p {
            font-size: 14px;
            color: #9ca3af;
            margin: 0;
            font-weight: 500;
        }

        /* ── Components: bottom 50%, 3x3 grid ── */
        .grid {
            flex: 0 0 50%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            background: #1a1b2e;
            overflow: hidden;
        }

        .cell {
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            border-right: 1px solid rgba(255,255,255,0.06);
            background: #1a1b2e;
        }

        .cell:nth-child(3n) { border-right: none; }
        .cell:nth-child(n+7) { border-bottom: none; }

        /* ── Stat ── */
        .stat { width: 100%; }
        .stat-label { font-size: 8px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .stat-row { display: flex; align-items: baseline; gap: 5px; }
        .stat-value { font-size: 17px; font-weight: 700; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .stat-change { font-size: 9px; font-weight: 700; color: #22c55e; }

        /* ── Mini chart ── */
        .chart { display: flex; align-items: flex-end; gap: 3px; height: 26px; width: 100%; justify-content: center; }
        .bar { width: 7px; border-radius: 3px 3px 0 0; background: #7C3AED; }
        .bar:nth-child(even) { background: #3b82f6; }

        /* ── Buttons ── */
        .btn-pair { display: flex; gap: 5px; }
        .btn-p { background: #7C3AED; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-size: 9px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
        .btn-o { background: transparent; color: #7C3AED; border: 1px solid rgba(124,58,237,0.5); padding: 6px 12px; border-radius: 5px; font-size: 9px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }

        /* ── Input ── */
        .input-g { display: flex; flex-direction: column; gap: 2px; width: 100%; }
        .input-l { font-size: 8px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .input-f { background: #13141f; border: 1px solid rgba(255,255,255,0.06); padding: 5px 8px; border-radius: 5px; font-size: 9px; width: 100%; box-sizing: border-box; font-family: 'Inter', sans-serif; color: #e2e8f0; }

        /* ── Badges ── */
        .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .b-1 { background: rgba(34,197,94,0.15); color: #22c55e; }
        .b-2 { background: rgba(124,58,237,0.15); color: #7C3AED; }
        .b-3 { background: rgba(245,158,11,0.15); color: #f59e0b; }

        /* ── Progress ── */
        .prog { display: flex; flex-direction: column; gap: 3px; width: 100%; }
        .prog-l { font-size: 8px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .prog-track { width: 100%; height: 5px; background: rgba(255,255,255,0.03); border-radius: 3px; overflow: hidden; }
        .prog-fill { height: 100%; width: 72%; background: #22c55e; border-radius: 3px; }

        /* ── Toggle ── */
        .toggle { display: flex; align-items: center; gap: 6px; }
        .toggle-t { width: 30px; height: 16px; background: rgba(124,58,237,0.3); border-radius: 8px; position: relative; }
        .toggle-k { width: 12px; height: 12px; background: #7C3AED; border-radius: 50%; position: absolute; top: 2px; right: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .toggle-l { font-size: 8px; color: #6b7280; font-weight: 500; }

        /* ── Avatars ── */
        .avatars { display: flex; }
        .av { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #1a1b2e; margin-left: -5px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; }
        .av:first-child { margin-left: 0; }
        .av-1 { background: #7C3AED; } .av-2 { background: #3b82f6; } .av-3 { background: #22c55e; } .av-4 { background: #f59e0b; }

        /* ── Table ── */
        .tbl { width: 100%; font-size: 7px; border-collapse: collapse; }
        .tbl th { text-align: left; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.3px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .tbl td { padding: 2px 0; color: #9ca3af; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
        .tbl .r { text-align: right; font-weight: 700; color: #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Data Dense</h1>
            <p>Real-time monitoring</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
