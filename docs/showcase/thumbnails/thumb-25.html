<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vibe-paint · Zen Wabi-Sabi Thumbnail</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F0EB;
      color: #2C2C2C;
      line-height: 1.8;
      letter-spacing: 0.3px;
    }

    .container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .hero {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: 56px;
      font-weight: 400;
      margin: 0 0 6px 0;
      color: #2C2C2C;
      line-height: 1.4;
    }

    .hero p {
      font-size: 14px;
      margin: 0;
      color: #5A5A5A;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .grid {
      flex: 0 0 50%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      overflow: hidden;
    }

    .cell {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 0.5px solid #D4C9BC;
      border-bottom: 0.5px solid #D4C9BC;
      background: #FDFCF9;
    }

    .cell:nth-child(3n) { border-right: none; }
    .cell:nth-child(n+7) { border-bottom: none; }

    /* Component styling */
    .stat { width: 100%; }
    .stat-label { font-size: 11px; color: #888888; margin-bottom: 4px; font-weight: 400; }
    .stat-row { display: flex; align-items: center; gap: 4px; }
    .stat-value { font-size: 16px; font-weight: 400; color: #8B6914; }
    .stat-change { font-size: 12px; color: #5A6B52; }

    .chart { display: flex; align-items: flex-end; justify-content: center; gap: 3px; width: 100%; height: 60px; }
    .bar { background: #8B6914; width: 6px; border-radius: 2px; opacity: 0.7; }

    .btn-pair { display: flex; gap: 6px; }
    .btn-p, .btn-o { padding: 6px 10px; font-size: 12px; border: 0.5px solid transparent; border-radius: 3px; cursor: pointer; font-weight: 400; letter-spacing: 0.2px; }
    .btn-p { background: #8B6914; color: white; }
    .btn-o { background: #F5F0EB; color: #2C2C2C; border: 0.5px solid #D4C9BC; }

    .input-g { width: 85%; }
    .input-l { display: block; font-size: 11px; color: #5A5A5A; margin-bottom: 3px; font-weight: 400; }
    .input-f { width: 100%; padding: 5px 8px; border: 0.5px solid #D4C9BC; border-radius: 2px; font-size: 12px; box-sizing: border-box; background: white; }

    .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
    .badge { padding: 3px 8px; font-size: 10px; border-radius: 12px; font-weight: 400; letter-spacing: 0.2px; }
    .b-1 { background: #EBF0E8; color: #4A5A42; }
    .b-2 { background: #EBF0F5; color: #4A5A7A; }
    .b-3 { background: #F5F0E8; color: #8B7A5A; }

    .prog { width: 85%; }
    .prog-l { font-size: 11px; color: #5A5A5A; margin-bottom: 4px; font-weight: 400; }
    .prog-track { background: #E8E3DB; border-radius: 2px; height: 4px; overflow: hidden; }
    .prog-fill { background: #8B6914; height: 100%; width: 65%; }

    .toggle { display: flex; align-items: center; gap: 6px; }
    .toggle-t { width: 32px; height: 18px; background: #D4C9BC; border-radius: 2px; position: relative; }
    .toggle-k { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 1px; transition: left 0.3s; }
    .toggle-l { font-size: 12px; color: #2C2C2C; font-weight: 400; }

    .avatars { display: flex; gap: 3px; }
    .av { width: 24px; height: 24px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 400; color: white; }
    .av-1 { background: #8B6914; }
    .av-2 { background: #5A6B52; }
    .av-3 { background: #6B7A8B; }
    .av-4 { background: #A68B5B; }

    .tbl { font-size: 11px; width: 100%; border-collapse: collapse; }
    .tbl th, .tbl td { padding: 4px; text-align: left; border-bottom: 0.5px solid #E8E3DB; font-weight: 400; }
    .tbl th { color: #8B6914; }
    .tbl td { color: #2C2C2C; }
    .tbl .r { text-align: right; }
  </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Zen Wabi-Sabi</h1>
            <p>Imperfect beauty</p>
        </div>
        <div class="grid">
            <div class="cell"><div class="stat"><div class="stat-label">Revenue</div><div class="stat-row"><span class="stat-value">$12.4k</span><span class="stat-change">↑ 8%</span></div></div></div>
            <div class="cell"><div class="chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:80%"></div></div></div>
            <div class="cell"><div class="btn-pair"><button class="btn-p">Save</button><button class="btn-o">Cancel</button></div></div>
            <div class="cell"><div class="input-g"><label class="input-l">Email</label><input type="text" class="input-f" placeholder="you@example.com"></div></div>
            <div class="cell"><div class="badges"><span class="badge b-1">Active</span><span class="badge b-2">Online</span><span class="badge b-3">Pending</span></div></div>
            <div class="cell"><div class="prog"><div class="prog-l">Upload</div><div class="prog-track"><div class="prog-fill"></div></div></div></div>
            <div class="cell"><div class="toggle"><div class="toggle-t"><div class="toggle-k"></div></div><span class="toggle-l">Dark mode</span></div></div>
            <div class="cell"><div class="avatars"><div class="av av-1">A</div><div class="av av-2">B</div><div class="av av-3">C</div><div class="av av-4">D</div></div></div>
            <div class="cell"><table class="tbl"><tr><th>Item</th><th class="r">Qty</th></tr><tr><td>Widget</td><td class="r">128</td></tr><tr><td>Module</td><td class="r">64</td></tr></table></div>
        </div>
    </div>
</body>
</html>
